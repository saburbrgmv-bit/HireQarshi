<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#121316;
    --paper:#F3F1EC;
    --stub:#E7E2D6;
    --accent:#C4491F;
    --accent-soft:#E7CBBC;
    --line: rgba(18,19,22,0.16);
    --radius:18px;
  }

  *{box-sizing:border-box;}

  html,body{
    height:100%;
    margin:0;
  }

  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(196,73,31,0.10), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(196,73,31,0.08), transparent 40%),
      var(--ink);
    font-family:'Work Sans', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 20px;
  }

  /* ---------- ticket card ---------- */

  .ticket{
    position:relative;
    width:100%;
    max-width:860px;
    display:grid;
    grid-template-columns:1fr 300px;
    background:var(--paper);
    border-radius:var(--radius);
    box-shadow:0 40px 80px rgba(0,0,0,0.45), 0 2px 0 rgba(255,255,255,0.04) inset;
    overflow:hidden;
  }

  .ticket-main{
    padding:56px 52px;
  }

  .eyebrow{
    font-size:12.5px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin:0 0 14px;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:clamp(30px, 4vw, 40px);
    line-height:1.08;
    margin:0 0 10px;
    letter-spacing:-0.01em;
  }

  .sub{
    font-size:15px;
    color:rgba(18,19,22,0.62);
    margin:0 0 36px;
    max-width:36ch;
    line-height:1.5;
  }

  /* ---------- stub side ---------- */

  .ticket-stub{
    position:relative;
    background:var(--stub);
    padding:56px 34px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    border-left:2px dashed rgba(18,19,22,0.22);
  }

  .ticket-stub::before,
  .ticket-stub::after{
    content:"";
    position:absolute;
    left:-14px;
    width:28px;
    height:28px;
    background:var(--ink);
    border-radius:50%;
  }
  .ticket-stub::before{ top:-14px; }
  .ticket-stub::after{ bottom:-14px; }

  .stub-label{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:rgba(18,19,22,0.5);
    margin:0 0 6px;
  }

  .stub-value{
    font-family:'Fraunces', serif;
    font-size:19px;
    font-weight:600;
    margin:0 0 26px;
  }

  .stub-code{
    writing-mode:vertical-rl;
    text-orientation:mixed;
    font-family:'Fraunces', serif;
    font-size:13px;
    letter-spacing:0.3em;
    color:rgba(18,19,22,0.35);
    align-self:flex-end;
  }

  /* ---------- form (form.as_p output) ---------- */

  form{
    margin:0;
  }

  form p{
    margin:0 0 20px;
    display:flex;
    flex-direction:column;
    gap:7px;
  }

  form label{
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.02em;
    color:rgba(18,19,22,0.75);
  }

  form input,
  form select,
  form textarea{
    font-family:'Work Sans', sans-serif;
    font-size:15px;
    padding:12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:#fff;
    color:var(--ink);
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
    width:100%;
  }

  form textarea{
    min-height:96px;
    resize:vertical;
  }

  form input:focus,
  form select:focus,
  form textarea:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 4px var(--accent-soft);
  }

  form input[type="checkbox"],
  form input[type="radio"]{
    width:auto;
    accent-color:var(--accent);
  }

  ul.errorlist{
    list-style:none;
    margin:2px 0 0;
    padding:0;
    color:var(--accent);
    font-size:12.5px;
  }

  button[type="submit"]{
    margin-top:10px;
    width:100%;
    padding:14px 18px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:10px;
    font-family:'Work Sans', sans-serif;
    font-size:15px;
    font-weight:600;
    letter-spacing:0.01em;
    cursor:pointer;
    transition:background .15s ease, transform .05s ease;
  }

  button[type="submit"]:hover{
    background:var(--accent);
  }

  button[type="submit"]:active{
    transform:translateY(1px);
  }

  button[type="submit"]:focus-visible,
  form input:focus-visible,
  form select:focus-visible,
  form textarea:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }

  /* ---------- responsive ---------- */

  @media (max-width:720px){
    .ticket{
      grid-template-columns:1fr;
    }
    .ticket-stub{
      border-left:none;
      border-top:2px dashed rgba(18,19,22,0.22);
      flex-direction:row;
      align-items:center;
      justify-content:space-between;
    }
    .ticket-stub::before,
    .ticket-stub::after{
      left:auto;
      top:-14px;
    }
    .ticket-stub::before{ left:-14px; }
    .ticket-stub::after{ right:-14px; }
    .stub-code{
      writing-mode:horizontal-tb;
      letter-spacing:0.1em;
    }
    .ticket-main{
      padding:40px 28px;
    }
  }

  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>

  <div class="ticket">

    <div class="ticket-main">
      <p class="eyebrow">Admission &middot; One seat</p>
      <h1>Create your account</h1>
      <p class="sub">Fill in your details below — it takes less than a minute to get your pass.</p>

      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
      </form>
    </div>

    <div class="ticket-stub">
      <div>
        <p class="stub-label">Status</p>
        <p class="stub-value">Not yet issued</p>
      </div>
      <p class="stub-code">REGISTER&nbsp;&middot;&nbsp;2026</p>
    </div>

  </div>

</body>
</html>
