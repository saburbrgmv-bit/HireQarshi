<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga Kirish — HireQarshi</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-0: #0a0c18;
            --bg-1: #12142b;
            --amber: #ffc154;
            --amber-dim: #ffc15422;
            --blue: #5b7fff;
            --text-hi: #f3f4fb;
            --text-lo: #9aa0c3;
            --line: #2a2e58;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: var(--bg-0);
            color: var(--text-hi);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* ---------- Ambient backdrop, consistent with the rest of HireQarshi ---------- */
        .grid-field {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(var(--bg-1) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-1) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 10%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 10%, transparent 75%);
            opacity: 0.5;
        }

        .glow {
            position: fixed;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
        }
        .glow.amber { background: #ffc15433; top: 8%; left: 12%; animation: drift1 16s ease-in-out infinite; }
        .glow.blue  { background: #5b7fff2e; bottom: 8%; right: 12%; animation: drift2 18s ease-in-out infinite; }

        @keyframes drift1 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(-30px, 25px) scale(1.15); }
        }
        @keyframes drift2 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(25px, -25px) scale(1.1); }
        }

        @media (prefers-reduced-motion: reduce) {
            .glow, .radar-ping, .pin { animation: none !important; }
        }

        /* ---------- Brand mark ---------- */
        .brandbar {
            position: fixed;
            top: 28px;
            left: clamp(20px, 5vw, 56px);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2;
        }
        .brandmark {
            width: 32px; height: 32px;
            border-radius: 9px;
            background: linear-gradient(140deg, var(--amber), #ff9d4d);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800;
            font-family: 'Unbounded', sans-serif;
            font-size: 14px;
            color: #14131f;
            box-shadow: 0 6px 18px -4px #ffc15466;
        }
        .brandname {
            font-family: 'Unbounded', sans-serif;
            font-size: 14px;
            font-weight: 600;
        }
        .brandname span { color: var(--amber); }

        /* ---------- Card ---------- */
        .login-container {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(180deg, #171a38b3, #12142bcc);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--line);
            padding: 46px 40px 40px;
            border-radius: 28px;
            box-shadow: 0 40px 70px -20px #00000066, inset 0 1px 0 #ffffff14;
            position: relative;
            z-index: 1;
            transition: border-color 0.3s ease;
        }

        .login-container:hover { border-color: #3a3f78; }

        /* Signature radar/pin motif, echoed from landing + register pages */
        .radar {
            position: relative;
            width: 96px;
            height: 96px;
            margin: 0 auto 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .radar-ring { position: absolute; border-radius: 50%; border: 1px solid #ffc15450; }
        .radar-ring.r1 { width: 44px; height: 44px; }
        .radar-ring.r2 { width: 70px; height: 70px; }
        .radar-ring.r3 { width: 96px; height: 96px; border-color: #5b7fff3a; }
        .radar-ping {
            position: absolute;
            width: 30px; height: 30px;
            border-radius: 50%;
            border: 1.5px solid var(--amber);
            animation: ping 2.8s cubic-bezier(0,0,.3,1) infinite;
        }
        @keyframes ping {
            0% { width: 26px; height: 26px; opacity: 0.9; }
            100% { width: 96px; height: 96px; opacity: 0; }
        }
        .pin {
            position: absolute;
            width: 24px; height: 24px;
            border-radius: 7px;
            background: linear-gradient(140deg, var(--amber), #ff9d4d);
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            box-shadow: 0 8px 18px -4px #ffc15488;
            z-index: 2;
        }
        .pin.small {
            width: 16px; height: 16px; font-size: 8px;
            background: linear-gradient(140deg, var(--blue), #7fa0ff);
            box-shadow: 0 6px 14px -4px #5b7fff77;
        }
        .pin.p2 { top: 0; left: 12%; animation: bob 3.2s ease-in-out infinite; }
        .pin.p3 { bottom: 2px; right: 10%; animation: bob 3.6s ease-in-out infinite 0.4s; }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 28px;
            font-family: 'Unbounded', sans-serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff 20%, var(--amber) 110%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Django form layout */
        .login-container p {
            margin-bottom: 18px;
            position: relative;
        }

        .login-container label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            font-size: 13.5px;
            color: var(--text-hi);
            letter-spacing: 0.2px;
        }

        .login-container input {
            width: 100%;
            padding: 13px 17px;
            background: #ffffff08;
            border: 1px solid var(--line);
            border-radius: 14px;
            font-size: 15px;
            font-family: 'Manrope', sans-serif;
            color: var(--text-hi);
            outline: none;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .login-container input::placeholder { color: #7d84ab; }

        .login-container input:focus {
            background: #ffffff0f;
            border-color: var(--amber);
            box-shadow: 0 0 0 4px #ffc15422;
        }

        .login-container button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--amber), #ff9d4d);
            color: #14131f;
            font-family: 'Manrope', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.35s cubic-bezier(.2,.8,.2,1), box-shadow 0.35s;
            margin-top: 8px;
            box-shadow: 0 14px 30px -10px #ffc15477;
        }

        .login-container button:hover { transform: translateY(-3px); box-shadow: 0 18px 36px -8px #ffc15499; }
        .login-container button:focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; }

        .login-container ul.errorlist {
            list-style: none;
            color: #ff8080;
            margin-bottom: 16px;
            font-size: 13px;
            background: #ff525215;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #ff525233;
        }

        @media (max-width: 480px) {
            .login-container { padding: 38px 26px; }
            .login-container h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="grid-field"></div>
    <div class="glow amber"></div>
    <div class="glow blue"></div>

    <div class="brandbar">
        <div class="brandmark">HQ</div>
        <div class="brandname">Hire<span>Qarshi</span></div>
    </div>

    <div class="login-container">

        <div class="radar">
            <div class="radar-ring r3"></div>
            <div class="radar-ring r2"></div>
            <div class="radar-ring r1"></div>
            <div class="radar-ping"></div>
            <div class="pin">📍</div>
            <div class="pin small p2">💼</div>
            <div class="pin small p3">🤝</div>
        </div>

        <h2>Qaytganingiz Bilan</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit">Tizimga Kirish</button>
        </form>
    </div>

</body>
</html>
